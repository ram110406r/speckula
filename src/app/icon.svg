<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9461FF"/>
      <stop offset="45%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Top pill (upper-right) -->
  <rect x="35" y="17" width="50" height="23" rx="11.5" fill="url(#pillGrad)"/>

  <!-- Middle connector (wider, taller) -->
  <rect x="19" y="32" width="54" height="30" rx="15" fill="url(#pillGrad)"/>

  <!-- Bottom pill (lower-left) -->
  <rect x="11" y="56" width="50" height="23" rx="11.5" fill="url(#pillGrad)"/>
</svg>
