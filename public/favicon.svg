<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 96" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="120" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9F7AEA"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
  </defs>

  <!-- Bottom pill — behind, drawn first -->
  <rect x="6"  y="62" width="76" height="26" rx="13" fill="url(#g)"/>

  <!-- Middle large rounded rect — sits on top of bottom pill -->
  <rect x="6"  y="14" width="80" height="56" rx="28" fill="url(#g)"/>

  <!-- Depth where middle overlaps bottom pill -->
  <rect x="6"  y="62" width="50" height="17" rx="8"  fill="rgba(55,10,140,0.30)"/>

  <!-- Top pill — in front, drawn last -->
  <rect x="40" y="1"  width="76" height="26" rx="13" fill="url(#g)"/>

  <!-- Depth where top pill overlaps middle -->
  <rect x="40" y="14" width="46" height="16" rx="8"  fill="rgba(55,10,140,0.30)"/>
</svg>
