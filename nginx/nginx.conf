# ==============================================================================
# SPECKULA — Production Nginx Configuration
# Dokploy handles SSL termination and domain routing; Nginx listens on port 80.
# Routing: /ws → backend:3001 (WebSocket)
#          /* → frontend:3000 (Next.js — owns all /api/* routes internally)
# ==============================================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --------------------------------------------------------------------------
    # JSON-structured access log
    # --------------------------------------------------------------------------
    log_format json_access escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log  /var/log/nginx/access.log  json_access;

    # --------------------------------------------------------------------------
    # Core performance
    # --------------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;
    client_max_body_size 10m;

    # --------------------------------------------------------------------------
    # Gzip compression
    # --------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        font/ttf
        font/otf
        image/svg+xml;

    # --------------------------------------------------------------------------
    # Rate limiting zones
    # --------------------------------------------------------------------------
    # General API: 60 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

    # Extension API: 200 requests/minute per IP (browser extension is chatty)
    limit_req_zone $binary_remote_addr zone=extension_limit:10m rate=200r/m;

    # WebSocket connections: 10 new connections/minute per IP
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/m;

    # --------------------------------------------------------------------------
    # Upstream definitions
    # --------------------------------------------------------------------------
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend {
        server backend:3001;
        keepalive 32;
    }

    # --------------------------------------------------------------------------
    # Main server block
    # --------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;   # Dokploy handles domain/SNI at its own proxy layer

        # --------------------------------------------------------------------
        # Security headers (applied globally to all responses)
        # --------------------------------------------------------------------
        add_header X-Frame-Options           "SAMEORIGIN"                           always;
        add_header X-Content-Type-Options    "nosniff"                              always;
        add_header X-XSS-Protection          "1; mode=block"                        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # --------------------------------------------------------------------
        # Internal health check (used by Docker healthcheck)
        # --------------------------------------------------------------------
        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        # --------------------------------------------------------------------
        # WebSocket endpoint — proxied directly to Fastify backend
        # --------------------------------------------------------------------
        location /ws {
            limit_req zone=ws_limit burst=5 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Long-lived WebSocket connections
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_connect_timeout 10s;
        }

        # --------------------------------------------------------------------
        # Next.js static assets — aggressive caching (content-hash filenames)
        # --------------------------------------------------------------------
        location /_next/static/ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_cache_bypass $http_upgrade;

            # 1 year, immutable — Next.js content-hashes these filenames
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Frame-Options        "SAMEORIGIN"                      always;
            add_header X-Content-Type-Options "nosniff"                         always;

            access_log off;
        }

        # --------------------------------------------------------------------
        # Next.js public folder (favicon, images, robots.txt, etc.)
        # --------------------------------------------------------------------
        location /static/ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            add_header Cache-Control "public, max-age=86400" always;
            access_log off;
        }

        # --------------------------------------------------------------------
        # All other traffic → Next.js frontend
        # Next.js /api/* routes proxy to the Fastify backend via BACKEND_URL
        # internally — Nginx does NOT need to route /api separately.
        # AI endpoints can be slow; generous timeout.
        # --------------------------------------------------------------------
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # AI/analysis endpoints can take time
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;
            proxy_connect_timeout 10s;

            # Pass through any WebSocket upgrades on arbitrary paths
            proxy_set_header   Upgrade    $http_upgrade;

            # Buffer tuning
            proxy_buffer_size        128k;
            proxy_buffers            4 256k;
            proxy_busy_buffers_size  256k;
        }

        # --------------------------------------------------------------------
        # Custom error pages
        # --------------------------------------------------------------------
        error_page 502 503 504 = @upstream_error;

        location @upstream_error {
            default_type application/json;
            add_header Content-Type "application/json" always;
            return 502 '{"error":"service_unavailable"}';
        }
    }
}
